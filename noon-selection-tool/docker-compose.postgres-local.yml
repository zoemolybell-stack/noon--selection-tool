services:
  postgres:
    image: postgres:16
    container_name: huihaokang-postgres-local
    environment:
      POSTGRES_DB: noon_ops
      POSTGRES_USER: noon
      POSTGRES_PASSWORD: noon_local_dev
    ports:
      - "${POSTGRES_LOCAL_PORT:-5433}:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noon -d noon_ops"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_local_data:
